<script>
  // 连接到我们刚才用 Python 跑起来的本地 WebSocket 服务
  const ws = new WebSocket('ws://localhost:8765');

  ws.onopen = () => {
    console.log('🟢 Figma Plugin connected to Local MCP Bridge!');
    parent.postMessage({ pluginMessage: { type: 'ws-ready' } }, '*');
  };

  ws.onclose = () => {
    console.log('🔴 Disconnected from Local MCP Bridge.');
  };

  // 接收来自 Figma Sandbox (code.ts) 的消息
  onmessage = (event) => {
    const msg = event.data.pluginMessage;

    if (msg.type === 'selection-updated') {
      // 收到 Figma 选中的节点数据后，通过 WebSocket 发给 Python Server
      if (ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify(msg.data));
      }
    } else if (msg.type === 'selection-cleared') {
      if (ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ status: "waiting", message: "当前未选中任何 Figma 图层" }));
      }
    }
  };
</script>
